# ── CloudGuard — Docker Compose ───────────────────────────────────────────────
# Cloud Computing topics demonstrated:
#   - Microservices architecture (each service in its own container)
#   - Service discovery (containers talk via service name, not IP)
#   - Distributed message broker (Kafka + Zookeeper)
#   - Distributed cache (Redis)
#   - Reverse proxy / API gateway (Nginx)
#   - Persistent volumes (DB, ML model, crypto keys survive restarts)
#   - Environment-variable driven configuration (12-factor app)
#   - Health checks on every service

version: '3.8'

services:

  # ── Zookeeper — Kafka coordination service ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka — distributed message broker (network traffic events) ────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis — distributed in-memory cache (stats, session data) ─────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend — Flask + SocketIO API (ML inference + REST) ──────────────────
  backend:
    build: ./backend
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started   # backend has graceful Kafka fallback
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/model:/app/model   # ML model artefacts
      - ./backend/keys:/app/keys     # RSA + AES crypto keys
      - cloudguard_db:/app           # persistent SQLite DB directory
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Frontend — React SPA (built with correct API URL, served by Nginx) ─────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost   # traffic goes through Nginx on :80
    depends_on:
      - backend

  # ── Nginx — reverse proxy / API gateway / load balancer ───────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cloudguard_db:   # named volume — DB directory persists across restarts
