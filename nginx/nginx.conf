# ── CloudGuard — Nginx Reverse Proxy ──────────────────────────────────────────
# Cloud Computing: Nginx acts as the single entry point, routing traffic to
# the correct microservice (frontend or backend) and terminating HTTP.
#
# Architecture:
#   Client → Nginx :80 → /api/*      → backend:5001 (Flask)
#                      → /socket.io/* → backend:5001 (Socket.IO)
#                      → /*           → frontend:80  (React SPA)

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone — shared memory for tracking request counts
    # Cloud / Web Tech: server-side rate limiting at the proxy layer
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    upstream backend {
        server backend:5001;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"           always;
        add_header X-Frame-Options         "DENY"              always;
        add_header X-XSS-Protection        "1; mode=block"     always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Login — tighter rate limit ─────────────────────────────────────
        location /api/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── API routes → Flask backend ────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Socket.IO WebSocket → Flask backend ───────────────────────────
        location /socket.io/ {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
        }

        # ── Everything else → React frontend ──────────────────────────────
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
        }
    }
}
